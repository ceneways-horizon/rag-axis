name: CI

on:
  push:
    branches: [ main, dev ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== TYPE CHECKING ====================
  typecheck:
    name: Type Check (mypy --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Run mypy (strict mode)
        run: mypy src/ragaxis --strict --show-error-codes

  # ==================== LINTING ====================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ragaxis tests

      - name: Run ruff format check
        run: ruff format --check src/ragaxis tests

  # ==================== TESTS ====================
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Run pytest
        run: |
          pytest -v --cov=ragaxis --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false  # Don't fail CI on codecov upload errors

  # ==================== DEPENDENCY CHECK ====================
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip install -e ".[all]"
          # CVE-2025-69872 (diskcache), CVE-2026-6587 (ragas), CVE-2025-3000 (torch):
          # transitive deps of the optional `bench`/`local` extras, no fixed
          # versions are available upstream yet. Tracked for re-evaluation.
          pip-audit --desc \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln CVE-2026-6587 \
            --ignore-vuln CVE-2025-3000

  # ==================== BUILD CHECK ====================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

  # ==================== ALL CHECKS PASSED ====================
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, dependency-check, build]
    if: always()

    steps:
      - name: Check all jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

      - name: All checks passed
        run: echo "✅ All CI checks passed!"

  # ==================== PUBLISH TO PYPI ====================
  publish:
    name: Publish to PyPI
    needs: all-checks
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
